name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Create release archive
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          PLUGIN_DIR=fastdictlookup.koplugin
          ARCHIVE_NAME=${PLUGIN_DIR}-v${VERSION}.zip
          PKG_ROOT=fastdictlookup_pkg
          rm -rf "$PKG_ROOT"
          mkdir -p "$PKG_ROOT/$PLUGIN_DIR"
          rsync -a ./ "$PKG_ROOT/$PLUGIN_DIR/" \
            --exclude="*.old" --exclude="*_example.lua" \
            --exclude="*.git*" --exclude="*.md" --exclude=".github/*" \
            --exclude="$PKG_ROOT" \
            --exclude="staging"
          (cd "$PKG_ROOT" && zip -r "../${ARCHIVE_NAME}" "$PLUGIN_DIR")
          echo "archive_name=${ARCHIVE_NAME}" >> $GITHUB_ENV
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.archive_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}